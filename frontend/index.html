<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexPA - Indian Bank Asset Quality Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Header Section -->
    <header class="custom-gradient text-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tight">NexPA Framework</h1>
                <p class="text-xs text-blue-200 mt-1 uppercase font-bold tracking-widest">RBI Compliance Asset Recovery Platform</p>
            </div>
            <span class="bg-blue-500/20 text-blue-300 border border-blue-400/30 px-3 py-1 text-xs rounded-full font-mono">Live Node v2.1</span>
        </div>
    </header>

    <main class="container mx-auto p-6 max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Interactive Single Assessment Form Frame -->
        <section class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-bold text-gray-900 border-b pb-3 mb-4">Account Portfolio Parameters</h2>
            <form id="npaForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Age</label><input type="number" id="Age" value="38" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Annual Income (INR)</label><input type="number" id="Income" value="950000" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Loan Amount Outstanding (INR)</label><input type="number" id="LoanAmount" value="2500000" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">CIBIL Bureau Score (300-850)</label><input type="number" id="CreditScore" value="720" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Months Employed</label><input type="number" id="MonthsEmployed" value="48" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Active Credit Lines Balance</label><input type="number" id="NumCreditLines" value="3" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Lending Rate (%)</label><input type="number" step="0.01" id="InterestRate" value="10.5" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Loan Term Length (Months)</label><input type="number" id="LoanTerm" value="120" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Calculated Debt-to-Income Ratio</label><input type="number" step="0.01" id="DTIRatio" value="0.38" class="w-full border rounded p-2 text-sm bg-gray-50 focus:bg-white" required></div>
                <div><label class="block text-xs font-bold text-gray-500 mb-1">Tracked Overdue Timeline (DPD)</label><input type="number" id="DPD" value="45" class="w-full border rounded p-2 text-sm bg-amber-50 focus:bg-white font-semibold" required></div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Credit Allocation Purpose</label>
                    <select id="LoanPurpose" class="w-full border rounded p-2 text-sm bg-gray-50"><option>Home</option><option>Business</option><option>Auto</option><option>Education</option><option>Personal</option></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Employment Type Status</label>
                    <select id="EmploymentType" class="w-full border rounded p-2 text-sm bg-gray-50"><option>Salaried</option><option>Self-Employed</option><option>Unemployed</option></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Education Certification Level</label>
                    <select id="Education" class="w-full border rounded p-2 text-sm bg-gray-50"><option>Graduate</option><option>PostGraduate</option><option>Undergraduate</option><option>Professional</option></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Marital Status</label>
                    <select id="MaritalStatus" class="w-full border rounded p-2 text-sm bg-gray-50"><option>Married</option><option>Single</option><option>Divorced</option></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Active Collateral/Mortgage Attached</label>
                    <select id="HasMortgage" class="w-full border rounded p-2 text-sm bg-gray-50"><option>No</option><option>Yes</option></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Family Dependents Present</label>
                    <select id="HasDependents" class="w-full border rounded p-2 text-sm bg-gray-50"><option>No</option><option>Yes</option></select>
                </div>
                <div class="md:col-span-2 pt-2">
                    <button type="button" onclick="predictSingleAccount()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow text-sm uppercase tracking-wider transition">Evaluate Account Status</button>
                </div>
            </form>
        </section>

        <!-- Right Management & Batch Operational Processing Sidebar Panel -->
        <section class="space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-lg font-bold text-gray-900 border-b pb-3 mb-4">Single Audit Feedback</h2>
                <div id="singleOutput" class="text-sm text-gray-500 italic p-4 text-center bg-gray-50 rounded border border-dashed">Submit an asset profile to generate real-time RBI classification and remediation measures.</div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-lg font-bold text-gray-900 border-b pb-3 mb-4">Enterprise Batch Dispatch Desk</h2>
                <label class="block text-xs font-bold text-gray-500 mb-2">Upload Core Operational Ledger File (.csv)</label>
                <input type="file" id="batchFileSelector" accept=".csv" class="w-full text-xs text-gray-600 border rounded p-2 bg-gray-50 file:mr-4 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <button type="button" onclick="processBatchLedger()" class="w-full mt-3 bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 px-4 rounded shadow text-xs uppercase tracking-wider transition">Process Batch Profile</button>
            </div>
        </section>
    </main>

    <!-- Consolidated Ledger Performance Report Render Block -->
    <section class="container mx-auto px-6 pb-12">
        <div id="batchReportContainer" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hidden">
            <h2 class="text-xl font-black text-gray-900 mb-4 border-b pb-2">Consolidated System Tracking Report</h2>
            <div class="overflow-x-auto w-full" id="batchTableOutput"></div>
        </div>
    </section>

    <!-- UI Interaction Scripts Orchestrator -->
    <script>
        const API_HOST = "http://127.0.0.1:8000";

        async function predictSingleAccount() {
            const outputFrame = document.getElementById("singleOutput");
            outputFrame.innerHTML = "<div class='text-center py-4 text-blue-600 font-medium animate-pulse'>Running compliance rules...</div>";
            
            const payload = {};
            const elements = ["Age", "Income", "LoanAmount", "CreditScore", "MonthsEmployed", "NumCreditLines", "InterestRate", "LoanTerm", "DTIRatio", "Education", "EmploymentType", "MaritalStatus", "HasMortgage", "HasDependents", "LoanPurpose", "HasCoSigner", "DPD"];
            
            elements.forEach(id => {
                const el = document.getElementById(id);
                if(el) payload[id] = ["Education", "EmploymentType", "MaritalStatus", "HasMortgage", "HasDependents", "LoanPurpose", "HasCoSigner"].includes(id) ? el.value : Number(el.value);
            });
            payload["HasCoSigner"] = payload["HasCoSigner"] || "No";

            try {
                const res = await fetch(`${API_HOST}/predict`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                let accentColor = data.color_profile === 'GREEN' ? '#10B981' : data.color_profile === 'AMBER' ? '#F59E0B' : '#EF4444';
                
                outputFrame.innerHTML = `
                    <div class="p-4 rounded-lg border-l-4 bg-gray-50" style="border-color: ${accentColor}">
                        <div class="text-xs uppercase tracking-widest font-bold text-gray-400 mb-1">RBI Status</div>
                        <div class="text-lg font-black text-slate-900 mb-3">${data.rbi_asset_classification}</div>
                        <div class="space-y-1.5 text-xs text-slate-700">
                            <p><strong>Overdue Status (DPD):</strong> ${data.account_dpd} Days</p>
                            <p><strong>Predictive Portfolio Risk (ML):</strong> ${(data.ml_default_probability * 100).toFixed(1)}%</p>
                            <p><strong>Mandated Provisioning:</strong> <span class="bg-blue-100 text-blue-800 font-mono px-1.5 py-0.5 rounded">${data.regulatory_provisioning}</span></p>
                        </div>
                        <div class="mt-4 p-3 bg-white border rounded text-xs text-slate-900 shadow-sm">
                            <strong class="text-blue-700 uppercase tracking-wide block mb-1">Required Recovery Action:</strong>
                            ${data.actionable_measure}
                        </div>
                    </div>`;
            } catch (err) {
                outputFrame.innerHTML = `<div class='p-3 bg-red-50 border-l-4 border-red-500 text-xs text-red-700'><strong>Connection Failure:</strong> Backend server at ${API_HOST} is unreachable.</div>`;
            }
        }

        async function processBatchLedger() {
            const inputTarget = document.getElementById("batchFileSelector");
            const container = document.getElementById("batchReportContainer");
            const tableDiv = document.getElementById("batchTableOutput");
            
            if (!inputTarget.files[0]) { alert("Operation rejected: Please select a balance sheet CSV file first."); return; }
            
            const formData = new FormData();
            formData.append("file", inputTarget.files[0]);
            
            tableDiv.innerHTML = "<div class='text-center py-8 text-slate-500 font-medium animate-pulse'>Processing ledger records through scoring engine...</div>";
            container.classList.remove("hidden");

            try {
                const res = await fetch(`${API_HOST}/batch_predict`, { method: "POST", body: formData });
                const data = await res.json();
                
                let html = `
                    <table class="w-full text-left border-collapse text-xs">
                        <thead>
                            <tr class="bg-slate-100 border-b border-slate-200 text-slate-600 uppercase font-bold tracking-wider">
                                <th class="p-3">Ref ID</th>
                                <th class="p-3">RBI Classification</th>
                                <th class="p-3">DPD Status</th>
                                <th class="p-3">Predictive ML Risk</th>
                                <th class="p-3">Regulatory Provisioning</th>
                                <th class="p-3">Statutory Remediation Protocol</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">`;

                data.results.forEach((r, i) => {
                    let rowBg = r.color_profile === 'CRITICAL_RED' || r.color_profile === 'RED' ? 'bg-red-50/50 hover:bg-red-50' : r.color_profile === 'AMBER' ? 'bg-amber-50/40 hover:bg-amber-50' : 'bg-white hover:bg-slate-50';
                    html += `
                        <tr class="${rowBg} transition">
                            <td class="p-3 font-mono text-slate-500">ACC-${10400 + i}</td>
                            <td class="p-3 font-bold text-slate-900">${r.rbi_asset_classification}</td>
                            <td class="p-3 font-medium">${r.account_dpd} Days</td>
                            <td class="p-3">${(r.ml_default_probability * 100).toFixed(0)}%</td>
                            <td class="p-3"><span class="px-2 py-0.5 font-mono font-bold rounded bg-slate-200/60">${r.regulatory_provisioning}</span></td>
                            <td class="p-3 font-medium text-slate-800">${r.actionable_measure}</td>
                        </tr>`;
                });

                html += "</tbody></table>";
                tableDiv.innerHTML = html;
            } catch (err) {
                tableDiv.innerHTML = `<div class='p-4 bg-red-50 text-xs text-red-700 rounded border border-red-200'><strong>Batch failure:</strong> API processing error. Verify that your server terminal is listening on port 8000.</div>`;
            }
        }
    </script>
</body>
</html>
